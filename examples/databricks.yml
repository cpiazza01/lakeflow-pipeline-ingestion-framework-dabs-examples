bundle:
  name: lakeflow-pipeline-ingestion-framework-examples

workspace:
  root_path: /Workspace/${var.domain}/.bundle/${bundle.name}/${bundle.target}

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------
variables:

  domain:
    description: >
      Name of the Databricks domain where this pipeline is developed.
      This is used as a tag on all resources for cost attribution and discoverability.
      Also used as part of the workspace root path, so the domain folder must already exist in the workspace before deploying the bundle.
    default: lakeflow-pipeline-ingestion-framework-examples

  catalog:
    description: >
      Unity Catalog name for this environment (e.g. enterprise_dev, enterprise_prod).
      This catalog and the 'staging' schema must already exist — neither is created by the bundle.
      Only the raw_files volume is provisioned by the bundle.

  warehouse_id:
    description: >
      SQL Warehouse ID used by the tagging and expectations report job tasks.
      Find it in: Databricks UI → SQL → SQL Warehouses → (your warehouse) → Connection details.

  pipeline_schema:
    description: Schema within 'catalog' where the Lakeflow Declarative Pipeline is registered.
    default: silver

  audit_schema:
    description: Schema within 'catalog' where the pipeline event log table is stored.
    default: audit

  performance_target:
    description: >
      Job cluster performance target.
      PERFORMANCE_OPTIMIZED reduces cold-start time; STANDARD reduces cost.
    default: STANDARD

# ---------------------------------------------------------------------------
# Resources
#
# The 'staging_raw_files' volume is created inside the pre-existing 'staging'
# schema. Deploying the bundle provisions the volume automatically.
#
# The pipeline and job resources (resources/*.yml) are generated by
# lakeflow-generate and included via the include directive below.
# ---------------------------------------------------------------------------
resources:
  jobs:
    setup_masking_functions:
      name: Setup masking functions
      tasks:
        - task_key: deploy_masking_functions
          notebook_task:
            notebook_path: setup/deploy_masking_functions.py
            base_parameters:
              catalog: "${var.catalog}"

# ---------------------------------------------------------------------------
# Generated resource files from lakeflow-generate are included here.
# Run `lakeflow-generate --config pipeline_config.yaml --env <env>` before deploying.
# src/ and resources/ are gitignored (regenerated on every deploy), so sync.include
# explicitly overrides that exclusion so the CLI still uploads them to the workspace.
# ---------------------------------------------------------------------------
sync:
  include:
    - src/**

include:
  - resources/*.yml

# ---------------------------------------------------------------------------
# Targets
# Each target sets the catalog and warehouse for that environment.
# The --env flag passed to lakeflow-generate must match the target name so that
# ${env} substitution in pipeline_config.yaml resolves to the same catalog.
# ---------------------------------------------------------------------------
targets:

  local_dev:
    default: true
    mode: development   # prefixes all resources with [dev <username>] for per-developer isolation
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: enterprise_dev
      warehouse_id: ad000a7468954636 

  dev:
    variables:
      catalog: enterprise_dev
      warehouse_id: ad000a7468954636 

  test:
    variables:
      catalog: enterprise_test
      warehouse_id: your_warehouse_id

  prod:
    variables:
      catalog: enterprise_prod
      warehouse_id: your_warehouse_id
